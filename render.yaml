services:
  - type: web
    name: regenera-ledger
    runtime: python
    plan: free
    rootDir: .   # Root of the repo (not /backend)
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false   # Set to /etc/secrets/firebase-service-account.json in dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.0.0
      # FRONTEND_URL is no longer needed — frontend and backend share the same origin
